name: Latest blog post workflow

on:
  push:
    branches:
      - main   # 기본 브랜치 맞게 수정 가능
  schedule:
    - cron: '0 * * * *'   # 매 시간 실행
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://noru-kang.github.io/feed.xml"
          max_post_count: 5
          disable_html_encoding: true
          tag_post_pre_newline: true
          template: "- $title [**[바로가기]**]($url)$newline"

      # 🔥 핵심: inactivity 방지용 강제 commit
      - name: Keep workflow alive (force commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "keep alive" || echo "No changes"
          git push
