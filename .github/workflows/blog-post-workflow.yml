name: Latest blog post workflow
on:
  schedule:
    # 매 시간 0분에 실행
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://noru-kang.github.io/feed.xml"
          accept_header: "text/xml"
          max_post_count: 5
          # ( ) 같은 특수문자가 &lpar; 등으로 변환되는 것을 방지합니다.
          escape_html: false
          # 각 포스트가 새로운 줄(Row)에 들어가도록 템플릿 끝에 개행을 포함합니다.
          template: "| $title | [바로가기]($url) |$newline"
